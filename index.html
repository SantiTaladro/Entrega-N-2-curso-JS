<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drill CapStore - Entrega 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Drill CapStore</h1>
        <div id="mensaje" class="mb-3"></div> <div class="row">
            <div class="col-md-8">
                <h3>Catálogo de Gorras</h3>
                <div id="catalogo" class="row g-3"></div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h3>Carrito</h3>
                    <ul id="carrito-lista" class="list-group mb-3"></ul>
                    <h4>Total c/ IVA: $<span id="total">0</span></h4>
                    <button id="btn-finalizar" class="btn btn-success w-100 mt-2">Finalizar Compra</button>
                    <button id="btn-vaciar" class="btn btn-danger w-100 mt-2">Vaciar Carrito</button>
                </div>
            </div>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
